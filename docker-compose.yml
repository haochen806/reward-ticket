services:
  monitor:
    build: .
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    shm_size: '2gb'

  web:
    build: .
    command: ["python", "-m", "src.web", "/app/data/config.yaml"]
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
